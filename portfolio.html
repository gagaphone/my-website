<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Photo Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/pwstyle.css">


</head>

<body>

  <button id="sidebarToggle" class="sidebar-toggle">
    ☰
  </button>

  <div class="layout" id="layout">

    <!-- =========================
       LEFT FILTER PANEL (DYNAMIC)
  ========================== -->
    <aside class="filters closed" id="sidebar">
      <div class="filter-container">
        <div class="sidebar-top-space"></div>
        <h2 class="brand-title">.OGalanets Gallery</h2>
        <div class="filters-label">Filters:</div>
        <div class="filters-inner" id="filterBar"></div>

        <div class="sidebar-footer">

          <a href="https://www.instagram.com/ogalanets_fotos/" target="_blank" class="social-icon">
            <svg viewBox="0 0 24 24">
              <path
                d="M7 2C4.24 2 2 4.24 2 7v10c0 2.76 2.24 5 5 5h10c2.76 0 5-2.24 5-5V7c0-2.76-2.24-5-5-5H7zm10 2c1.65 0 3 1.35 3 3v10c0 1.65-1.35 3-3 3H7c-1.65 0-3-1.35-3-3V7c0-1.65 1.35-3 3-3h10zm-5 3.5A4.5 4.5 0 1 0 16.5 12 4.5 4.5 0 0 0 12 7.5zm0 2A2.5 2.5 0 1 1 9.5 12 2.5 2.5 0 0 1 12 9.5zM17.5 6.2a1 1 0 1 0 1 1 1 1 0 0 0-1-1z" />
            </svg>
          </a>

        </div>
      </div>
    </aside>



    <!-- =========================
       RIGHT VIEWER (CORE STAGE)
  ========================== -->
    <main class="viewer">

      <div class="image-wrap">

        <!-- PROGRESS INDICATOR -->
        <div class="progress-line">
          <div class="progress-fill"></div>
        </div>

        <!-- MAIN IMAGE -->
        <img id="mainImage" src="" alt="photography image" />

      </div>

      <!-- =========================
         META UI
    ========================== -->
      <div class="meta">

        <!-- counter -->
        <span id="counter">1 / 1</span>

        <!-- open project page -->
        <button id="moreBtn">More</button>

      </div>

    </main>

  </div>

  <!-- =========================
     SCRIPT
========================= -->
  <script src="js/pwscript.js" defer></script>

</body>

</html>
