<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ogalanets.photography</title>

  <link rel="stylesheet" href="css/pwproject.css">
  <link rel="icon" type="image/png" href="img/personal/olga-galanets.256x256.jpg">

  <script type="module" src="https://unpkg.com/ionicons@5.5.4/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.4/dist/ionicons/ionicons.js"></script>
</head>

<body>

<div class="project-page">

  <header class="project-topbar">
    <h1 class="project-title" id="overlayTitle">Project Title</h1>
    <a href="portfolio.html" class="close-btn" aria-label="Back to portfolio">&times;</a>
  </header>

  <main class="project-scroll">

    <div id="overlayMeta"></div>

    <!-- Share -->
    <div class="share-block">
      <span class="share-label">Share</span>

      <button class="share-btn" id="shareNative" title="Share on your device">
        <ion-icon name="share-social-outline"></ion-icon>
      </button>

      <a class="share-btn" id="shareFacebook" target="_blank" rel="noopener" title="Share on Facebook">
        <ion-icon name="logo-facebook"></ion-icon>
      </a>

      <a class="share-btn" id="shareTwitter" target="_blank" rel="noopener" title="Share on Twitter">
        <ion-icon name="logo-twitter"></ion-icon>
      </a>

      <a class="share-btn" id="shareLinkedIn" target="_blank" rel="noopener" title="Share on LinkedIn">
        <ion-icon name="logo-linkedin"></ion-icon>
      </a>

      <a class="share-btn contact-btn"
         href="mailto:ogalanets@gmail.com?subject=Photography Inquiry&body=Hi,%0D%0A%0D%0AI would like to contact you about your photography work."
         title="Contact Me">
        <ion-icon name="mail-outline"></ion-icon>
      </a>
    </div>

    <img id="overlayMain" alt="Project Image">

    <section class="gallery-section">
      <h2 class="gallery-heading">More from this category</h2>
      <div id="overlayGallery" class="overlay-gallery-grid"></div>
    </section>

  </main>

</div>

<script src="js/pwscript.js" defer></script>

</body>
</html>
